<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <!-- Viewport mobile-first : adapte le site à l'écran du téléphone -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Familial 💰</title>
    <meta name="description" content="Application de gestion du budget familial via Telegram" />

    <!-- Google Fonts : police moderne et lisible -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Notre feuille de style -->
    <link rel="stylesheet" href="style.css" />

    <!-- SDK Telegram Mini App : OBLIGATOIRE pour accéder à l'utilisateur Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <!-- ===========================
         EN-TÊTE DE L'APPLICATION
    =========================== -->
    <header class="app-header">
        <div class="header-content">
            <span class="header-icon">💰</span>
            <div>
                <h1 class="header-title">Budget Familial</h1>
                <p class="header-subtitle" id="userName">Chargement...</p>
            </div>
        </div>
    </header>

    <!-- ===========================
         NAVIGATION PAR ONGLETS
    =========================== -->
    <nav class="tab-nav">
        <button class="tab-btn active" id="tab-dashboard" onclick="showTab('dashboard')">
            📊 Tableau de bord
        </button>
        <button class="tab-btn" id="tab-add" onclick="showTab('add')">
            ➕ Ajouter
        </button>
        <button class="tab-btn" id="tab-history" onclick="showTab('history')">
            📋 Historique
        </button>
    </nav>

    <!-- ===========================
         CONTENU PRINCIPAL
    =========================== -->
    <main class="main-content">

        <!-- ---------------------------
             ONGLET 1 : TABLEAU DE BORD
        --------------------------- -->
        <section id="tab-content-dashboard" class="tab-content active">

            <!-- Cartes de résumé financier -->
            <div class="summary-cards">
                <!-- Carte : Total des revenus -->
                <div class="card card-income">
                    <div class="card-icon">📈</div>
                    <div class="card-label">Revenus totaux</div>
                    <div class="card-amount" id="totalIncome">0,00 €</div>
                </div>

                <!-- Carte : Total des dépenses -->
                <div class="card card-expense">
                    <div class="card-icon">📉</div>
                    <div class="card-label">Dépenses totales</div>
                    <div class="card-amount" id="totalExpenses">0,00 €</div>
                </div>

                <!-- Carte : Solde restant (sur toute la largeur) -->
                <div class="card card-balance" id="balanceCard">
                    <div class="card-icon">💳</div>
                    <div class="card-label">Solde restant</div>
                    <div class="card-amount" id="balance">0,00 €</div>
                </div>
            </div>

            <!-- Dépenses par catégorie -->
            <div class="section-title">🗂️ Dépenses par catégorie</div>
            <div id="categoriesList" class="categories-list">
                <p class="empty-message">Aucune dépense enregistrée.</p>
            </div>

            <!-- Bouton pour rafraîchir les données -->
            <button class="btn btn-secondary" onclick="loadDashboard()" style="margin-top: 1rem;">
                🔄 Actualiser
            </button>
        </section>

        <!-- ---------------------------
             ONGLET 2 : AJOUTER UNE TRANSACTION
        --------------------------- -->
        <section id="tab-content-add" class="tab-content">

            <h2 class="section-title">➕ Nouvelle transaction</h2>

            <!-- Message de succès ou d'erreur (caché par défaut) -->
            <div id="formMessage" class="form-message hidden"></div>

            <!-- Formulaire d'ajout -->
            <form id="transactionForm" onsubmit="submitTransaction(event)">

                <!-- Type de transaction : Revenu ou Dépense -->
                <div class="form-group">
                    <label class="form-label">Type de transaction *</label>
                    <div class="type-selector">
                        <button type="button" class="type-btn type-income active" id="typeIncome"
                            onclick="selectType('income')">
                            📈 Revenu
                        </button>
                        <button type="button" class="type-btn type-expense" id="typeExpense"
                            onclick="selectType('expense')">
                            📉 Dépense
                        </button>
                    </div>
                    <!-- Champ caché qui stocke la valeur sélectionnée -->
                    <input type="hidden" id="type" value="income" />
                </div>

                <!-- Montant -->
                <div class="form-group">
                    <label class="form-label" for="amount">Montant (€) *</label>
                    <input
                        type="number"
                        id="amount"
                        class="form-input"
                        placeholder="Ex: 1500.00"
                        step="0.01"
                        min="0.01"
                        required
                    />
                </div>

                <!-- Catégorie -->
                <div class="form-group">
                    <label class="form-label" for="category">Catégorie *</label>
                    <select id="category" class="form-input form-select" required>
                        <!-- Les options changent dynamiquement selon le type sélectionné -->
                    </select>
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label class="form-label" for="description">Description</label>
                    <input
                        type="text"
                        id="description"
                        class="form-input"
                        placeholder="Ex: Courses au supermarché"
                        maxlength="200"
                    />
                </div>

                <!-- Date -->
                <div class="form-group">
                    <label class="form-label" for="date">Date *</label>
                    <input
                        type="date"
                        id="date"
                        class="form-input"
                        required
                    />
                </div>

                <!-- Bouton de soumission -->
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    💾 Enregistrer la transaction
                </button>
            </form>
        </section>

        <!-- ---------------------------
             ONGLET 3 : HISTORIQUE
        --------------------------- -->
        <section id="tab-content-history" class="tab-content">
            <h2 class="section-title">📋 Historique des transactions</h2>

            <!-- Filtre par type -->
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterHistory('all', this)">Tous</button>
                <button class="filter-btn" onclick="filterHistory('income', this)">Revenus</button>
                <button class="filter-btn" onclick="filterHistory('expense', this)">Dépenses</button>
            </div>

            <!-- Liste des transactions -->
            <div id="transactionsList">
                <p class="empty-message">Aucune transaction enregistrée.</p>
            </div>
        </section>

    </main>

    <!-- Notre script JavaScript -->
    <script src="app.js"></script>
</body>
</html>
